# Based on:
# https://docs.github.com/en/packages/managing-github-packages-using-github-actions-workflows/publishing-and-installing-a-package-with-github-actions#publishing-a-package-using-an-action
# https://github.com/marketplace/actions/build-and-push-docker-images
# https://docs.docker.com/build/ci/github-actions/multi-platform/
# https://docs.docker.com/build/ci/github-actions/manage-tags-labels/
# https://docs.docker.com/build/ci/github-actions/cache/
# https://docs.docker.com/build/ci/github-actions/attestations/
# https://docs.docker.com/build/ci/github-actions/reproducible-builds/

# TODO:
# - Push to openregistry.dev
# - Test before push seems like a nice thing to have
# - are attestations and sbom working?

on:
  push:
    branches: [ "main" ]
    paths:
      - .github/workflows/docker-build-push.yml
      - app1/.gitignore
      - app1/Dockerfile
      - app1/api/**
      - app1/requirements.txt
  pull_request:
    branches: [ "main" ]
    paths:
      - .github/workflows/docker-build-push.yml
      - app2/.gitignore
      - app2/Dockerfile
      - app2/api/**
      - app2/requirements.txt
jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - app1
          - app2
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}/${{ matrix.image }}
    outputs:
      image_tag: ${{ steps.output.outputs.image_tag }}
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      # Log into hub.docker.com to avoid unauthenticated rate limting
      # https://docs.docker.com/docker-hub/usage/
      # - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # pin@v3.3.0
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_TOKEN }}
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # pin@v4.2.2

      # Using dev-${sha}-${timestamp} format for Flux: https://fluxcd.io/flux/guides/image-update/#imagepolicy-examples
      - id: output
        run: |
          echo "image_tag=dev-$(git rev-parse --short=7 HEAD)-$(git log -1 --pretty=%ct)" | tee -a $GITHUB_OUTPUT

      - uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96 # pin@v5.6.1
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

          # dev-{{sha}}-{{commit_date 'X'}} was added for Flux. See https://fluxcd.io/flux/guides/image-update/#imagepolicy-examples
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=long
            type=raw,value=${{ steps.output.outputs.image_tag }}

      - uses: docker/setup-docker-action@370a7dad4b8ce8dbf00f9363e1652e5074dd6abe # pin@v4.1.0
        with:
          daemon-config: |
            {
              "debug": true,
              "features": {
                "containerd-snapshotter": true
              }
            }
      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # pin@v3.3.0
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@4574d27a4764455b42196d70a065bc6853246a25 # pin@v3.4.0
      - uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # pin@v3.9.0
      - name: Get Git commit timestamps for reproducible builds
        run: echo "TIMESTAMP=$(git log -1 --pretty=%ct)" >> $GITHUB_ENV
      - uses: docker/build-push-action@ca877d9245402d1537745e0e356eab47c3520991 # pin@v6.13.0
        env:
          SOURCE_DATE_EPOCH: ${{ env.TIMESTAMP }}
        with:
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          context: ${{ matrix.image }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          push: ${{ github.event_name != 'pull_request' }}
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          # build-args: |
          #   POETRY_HTTP_BASIC_GITLAB_USERNAME=${{ env.POETRY_HTTP_BASIC_GITLAB_USERNAME }}
          # secrets: |
          #   POETRY_HTTP_BASIC_GITLAB_PASSWORD=${{ secrets.POETRY_HTTP_BASIC_GITLAB_PASSWORD }}
      # - name: Generate artifact attestation
      #   uses: actions/attest-build-provenance@520d128f165991a6c774bcb264f323e3d70747f4 # pin@v2.2.0
      #   with:
      #     push-to-registry: true
      #     subject-digest: ${{ steps.push.outputs.digest }}
      #     subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
