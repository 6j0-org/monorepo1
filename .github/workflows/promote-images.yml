name: Promote Images

on:
  workflow_dispatch:
    inputs:
      image:
        type: choice
        # If you update this, you need to update the image list in in the define-matrix job below too.
        options:
          - all
          - app1
          - app2
          - app3
      promote:
        type: choice
        options:
          - from dev to test
          - from test to prod
jobs:
  # https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/running-variations-of-jobs-in-a-workflow
  define-matrix:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.images.outputs.selected }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && chmod a+x /usr/local/bin/yq
      - name: Define images
        id: images
        run: |
          if [[ "${{ github.event.inputs.image }}" = 'all' ]]; then
            # Read the image options from the workflow file, excluding 'all'
            selected="$(yq -o json '.on.workflow_dispatch.inputs.image.options | del(.. | select(. == "all"))' .github/workflows/promote-images.yml | jq -c .)"
          else
            selected='["${{ github.event.inputs.image }}"]'
          fi
          echo "selected=${selected}"
          echo "selected=${selected}" >> $GITHUB_OUTPUT

  promote-images:
    runs-on: ubuntu-latest
    needs: define-matrix
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.define-matrix.outputs.images) }}
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}/${{ matrix.image }}
    steps:
      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # pin@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          from_env=$(echo '${{ github.event.inputs.promote }}' | cut -d' ' -f2)
          to_env=$(echo '${{ github.event.inputs.promote }}' | cut -d' ' -f4)
          # github.repository outputs owner/repo_name, but we just need the repo_name.
          export github_repo=$(basename ${{ github.repository }})
          # https://docs.github.com/en/rest/packages/packages?apiVersion=2022-11-28#list-package-versions-for-a-package-owned-by-an-organization
          # Using "%2f" instead of "/" because we have to use this in a REST API.
          current_tag=$(curl -s -L -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/${github_repo}%2f${{ matrix.image }}/versions" | jq -r '.[].metadata.container.tags[]' | grep -E "^${from_env}-[0-9a-f]{7}-[0-9]+$" | sort -R | sort --field-separator=- -k 3 -r | head -n 1)
          if [[ -z "${current_tag}" ]]; then
            echo "ERROR: Could not find container with tag matching regex /${from_env}-[0-9a-f]{7}-[0-9]+/"
            exit 1
          fi
          docker pull \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${current_tag}"
          new_tag=$(echo ${current_tag} | sed -E "s/.*-([^-]+)-([^-]+)/${to_env}-\1-\2/")
          docker tag \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${current_tag}" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${new_tag}"
          docker push \
            -a \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
