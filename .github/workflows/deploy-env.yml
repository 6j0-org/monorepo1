name: Deploy Environment

on:
  workflow_dispatch:
    inputs:
      app1:
        type: boolean
      app2:
        type: boolean
      from_env:
        type: choice
        options:
          - main
          - dev
          - test
          - prod
      to_env:
        type: choice
        options:
          - main
          - dev
          - test
          - prod
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      selected_options: ${{ steps.set-outputs.outputs.selected }}
    steps:
      - name: Collect selected options
        id: set-outputs
        run: |
          selected=()
          if [ "${{ github.event.inputs.app1 }}" = 'true' ]; then selected+=("app1"); fi
          if [ "${{ github.event.inputs.app2 }}" = 'true' ]; then selected+=("app2"); fi
          echo "selected=$(jq -cn '$ARGS.positional' --args -- "${selected[@]}")"
          echo "selected=$(jq -cn '$ARGS.positional' --args -- "${selected[@]}")" >> $GITHUB_OUTPUT
  deploy-env:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        image: ${{ fromJSON(needs.prepare.outputs.selected_options) }}
        # image:
        #   - app1
        #   - app2
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}/${{ matrix.image }}
    steps:
      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # pin@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |

          # github.repository outputs owner/repo_name, but we just need the repo_name.
          export github_repo=$(basename ${{ github.repository }})

          # https://docs.github.com/en/rest/packages/packages?apiVersion=2022-11-28#list-package-versions-for-a-package-owned-by-an-organization
          # Using "%2f" instead of "/" because we have to use this in a REST API.
          current_tag=$(curl -s -L -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/${github_repo}%2f${{ matrix.image }}/versions" | jq -r '.[].metadata.container.tags[]' | grep -E '^${{ github.event.inputs.from_env }}-[0-9a-f]{7}-[0-9]+$' | sort -R | sort --field-separator=- -k 3 -r | head -n 1; set +x)
          docker pull \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${current_tag}"
          new_tag=$(echo ${current_tag} | sed -E 's/.*-([^-]+)-([^-]+)/${{ github.event.inputs.to_env }}-\1-\2/')
          docker tag \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${current_tag}" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${new_tag}"
          docker push \
            -a \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
