name: Deploy Environment

on:
  workflow_dispatch:
    inputs:
      from_env:
        type: choice
        options:
          - main
          - dev
          - staging
          - alpha
          - beta
          - prod
          - ninja
      to_env:
        type: choice
        options:
          - main
          - dev
          - staging
          - alpha
          - beta
          - prod
          - ninja
jobs:
  deploy-env:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        image:
          - app1
          # - build-api
          # - frontend
          # - litellm
          # - server-metrics-exporter
          # - server
    env:
      REGISTRY: ghcr.io
      ORG_NAME: 6j0-org

      # Using "%2F" instead of "/" because we have to use this in a REST API.
      IMAGE_NAME: ${{ github.repository }}%2F${{ matrix.image }}

    steps:
      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # pin@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |

          # https://docs.github.com/en/rest/packages/packages?apiVersion=2022-11-28#list-package-versions-for-a-package-owned-by-an-organization
          current_tag=$(curl -s -L -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "X-GitHub-Api-Version: 2022-11-28" 'https://api.github.com/orgs/${{ env.ORG_NAME }}/packages/container/${{ env.IMAGE_NAME }}/versions' | jq -r '.[].metadata.container.tags[]' | grep -E '^${{ github.event.inputs.from_env }}-[0-9a-f]{7}-[0-9]+$' | sort -R | sort --field-separator=- -k 3 -r | head -n 1)

          echo "Selected tag: $current_tag"

          docker pull \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${current_tag}"
          new_tag=$(echo ${current_tag} | sed -E 's/.*-([^-]+)-([^-]+)/${{ github.event.inputs.to_env }}-\1-\2/')
          docker tag \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${current_tag}" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${new_tag}"
          docker push \
            -a \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
